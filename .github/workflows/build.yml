name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: fingerprint-launcher-windows-x86_64
            ext: .exe

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: fingerprint-launcher-macos-aarch64
            ext: ""

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: fingerprint-launcher-macos-x86_64
            ext: ""

          - os: ubuntu-20.04
            target: x86_64-unknown-linux-gnu
            artifact: fingerprint-launcher-linux-x86_64
            ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libxkbcommon-dev \
            libgl-dev \
            libwayland-dev \
            libx11-dev \
            libfontconfig1-dev \
            libfreetype6-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-

      - name: Set macOS deployment target
        if: runner.os == 'macOS'
        run: |
          if [ "${{ matrix.target }}" = "aarch64-apple-darwin" ]; then
            echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> $GITHUB_ENV
          else
            echo "MACOSX_DEPLOYMENT_TARGET=10.12" >> $GITHUB_ENV
          fi

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir dist
          Copy-Item "target/${{ matrix.target }}/release/fingerprint-launcher.exe" "dist/"
          Compress-Archive -Path dist/* -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/fingerprint-launcher" "dist/"
          hdiutil create -volname "Fingerprint Launcher" \
            -srcfolder dist -ov -format UDZO \
            "${{ matrix.artifact }}.dmg"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/fingerprint-launcher" "dist/"
          tar -czf "${{ matrix.artifact }}.tar.gz" -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            *.zip
            *.dmg
            *.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
